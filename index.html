<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veritas Engine</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  background: #0f172a;
  border-bottom: 1px solid #1e293b;
}

header h1 {
  color: #38bdf8;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 8px;
}

.label {
  color: #94a3b8;
}

.scam {
  color: red;
  font-weight: bold;
}

.safe {
  color: #22c55e;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  color: #64748b;
}
</style></head><body><header>
  <h1>🔐 Veritas Engine</h1>
  <p>AI Scam Detection + Blockchain Proof</p>
</header><div class="container">  <div class="card">
    <h3>Check Message</h3>
    <textarea id="message" placeholder="Paste message here..."></textarea>
    <button onclick="analyze()">Analyze</button><div class="result" id="result" style="display:none;">
  <p><span class="label">Decision:</span> <span id="decision"></span></p>
  <p><span class="label">Confidence:</span> <span id="confidence"></span></p>
  <p><span class="label">Hash:</span> <span id="hash"></span></p>
  <p><span class="label">Signature:</span> <span id="signature"></span></p>
  <p><span class="label">Block:</span> <span id="block"></span></p>
  <p><span class="label">Time:</span> <span id="time"></span></p>
  <p><span class="label">Proof:</span> <a id="link" target="_blank">Open</a></p>
</div>

  </div></div><footer>
  © veritasengine.in • Trust System
</footer><script>
async function analyze() {
  const message = document.getElementById("message").value;

  if (!message) {
    alert("Enter message first");
    return;
  }

  try {
    const res = await fetch("https://veritas-system.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "mysecret123"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    document.getElementById("result").style.display = "block";

    document.getElementById("decision").innerText = data.decision;
    document.getElementById("confidence").innerText = data.confidence + "%";
    document.getElementById("hash").innerText = data.hash;
    document.getElementById("signature").innerText = data.signature;
    document.getElementById("block").innerText = data.block;
    document.getElementById("time").innerText = new Date(data.time).toLocaleString();

    const link = document.getElementById("link");
    link.href = data.link;
    link.innerText = "View Proof";

    if (data.decision === 3) {
      document.getElementById("decision").className = "scam";
    } else {
      document.getElementById("decision").className = "safe";
    }

  } catch (e) {
    alert("Server Error");
  }
}
</script></body>
</html>
