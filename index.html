<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veritas Guard</title><style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  margin: 0;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  margin-bottom: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
}

.btn {
  width: 48%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  font-size: 15px;
}

.generate { background: #2563eb; color: white; }
.verify { background: #16a34a; color: white; }

.status {
  margin-top: 10px;
  font-weight: bold;
}

.box {
  background: black;
  padding: 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 10px;
  word-break: break-all;
}

.actions button {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.copy { background: orange; }
.share { background: purple; color: white; }

.result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
  padding: 12px;
  border-radius: 10px;
}

.success {
  background: #16a34a;
}

.fail {
  background: #dc2626;
}

.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #94a3b8;
}
</style></head><body><div class="header">
🛡️ Veritas Guard — Tamper-Proof Verification System
</div><div class="container"><div class="card"><input id="msg" placeholder="Paste SMS / WhatsApp / Link"><div class="row">
<button class="btn generate" onclick="generate()">⚡ Generate Proof</button>
<button class="btn verify" onclick="verify()">🔍 Verify Proof</button>
</div><div class="status" id="status"></div><div class="box" id="hash"></div>
<div class="actions">
<button class="copy" onclick="copyHash()">Copy Hash</button>
</div><div class="box" id="sig"></div>
<div class="actions">
<button class="copy" onclick="copySig()">Copy Signature</button>
</div><div class="box" id="block"></div><div class="actions">
<button class="share" onclick="share()">Share Proof (WhatsApp)</button>
</div><div class="result" id="result"></div></div><div class="card" style="margin-top:20px;">
<b>How it works:</b>
<ul>
<li>Message → Engine analysis</li>
<li>Cryptographic hash generated</li>
<li>Digital signature applied</li>
<li>Stored in hashchain block</li>
<li>Any change → verification fails</li>
</ul>
</div><div class="footer">
Veritas Engine Demo — Bank Grade Proof System
</div></div><script>

let hash = "";
let signature = "";
let blockIndex = "";

async function generate() {

  document.getElementById("status").innerText = "Processing...";

  const message = document.getElementById("msg").value;

  const res = await fetch("https://veritas-trust-engine.onrender.com/check", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "mysecret123"
    },
    body: JSON.stringify({
      name: "user",
      dob: "2000",
      message: message
    })
  });

  const data = await res.json();

  hash = data.decision_hash;
  signature = data.decision_signature;
  blockIndex = data.block.index;

  document.getElementById("status").innerText = "✅ Proof Generated";

  document.getElementById("hash").innerText = "Hash:\n" + hash;
  document.getElementById("sig").innerText = "Signature:\n" + signature;
  document.getElementById("block").innerText = "Block Index: #" + blockIndex;

}

async function verify() {

  const message = document.getElementById("msg").value;

  const res = await fetch("https://veritas-trust-engine.onrender.com/verify", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "mysecret123"
    },
    body: JSON.stringify({
      name: "user",
      dob: "2000",
      message: message,
      decision_hash: hash,
      decision_signature: signature
    })
  });

  const data = await res.json();

  const resultBox = document.getElementById("result");

  if (data.valid) {
    resultBox.innerText = "✅ VERIFIED (Authentic)";
    resultBox.className = "result success";
  } else {
    resultBox.innerText = "❌ FAILED (Tampered)";
    resultBox.className = "result fail";
  }
}

function copyHash() {
  navigator.clipboard.writeText(hash);
  alert("Hash copied");
}

function copySig() {
  navigator.clipboard.writeText(signature);
  alert("Signature copied");
}

function share() {
  const text =
    "Veritas Proof\nHash: " + hash +
    "\nSignature: " + signature +
    "\nBlock: #" + blockIndex;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

</script></body>
</html>
