<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#070c13">

  <title>Veritas Intelligence — Result Card Reference</title>

  <!--
    VERITAS REFERENCE ONLY

    केवल layout, spacing, colors, icons और visual hierarchy reference हैं।

    Production में sample heading, reason, action, advice या contextual chips
    copy नहीं किए जाएँगे।

    Production-visible dynamic text backend canonical response:
    result.finalPublicVerdictV1
    से ही आएगा।
  -->

  <style>
    :root {
      color-scheme: dark;

      --page-bg: #000000;
      --app-bg: #070c13;
      --header-bg: rgba(7, 12, 19, 0.95);

      --card-bg: #101720;
      --card-deep: #0b1119;

      --text-main: #f7f9fc;
      --text-soft: #d4dae3;
      --text-muted: #919dab;

      --safe-accent: #18bd8b;
      --safe-rgb: 24, 189, 139;

      --attention-accent: #e9ae2f;
      --attention-rgb: 233, 174, 47;

      --suspicious-accent: #d49a27;
      --suspicious-rgb: 212, 154, 39;

      --red-accent: #ef4e60;
      --red-rgb: 239, 78, 96;

      --unavailable-accent: #98a6b6;
      --unavailable-rgb: 152, 166, 182;

      --active-accent: var(--attention-accent);
      --active-rgb: var(--attention-rgb);

      --action-start: #efb226;
      --action-end: #c8880d;
      --action-text: #151008;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;

      background: var(--page-bg);
      color: var(--text-main);

      font-family:
        "Noto Sans Devanagari",
        "Nirmala UI",
        "Segoe UI",
        Arial,
        sans-serif;

      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      min-height: 100svh;

      display: flex;
      flex-direction: column;
      align-items: center;

      background:
        radial-gradient(
          circle at 50% -10%,
          rgba(42, 149, 205, 0.08),
          transparent 35%
        ),
        #000;
    }

    /* =====================================================
       PREVIEW CONTROLS
    ====================================================== */

    .preview-controls {
      width: 100%;

      position: sticky;
      top: 0;
      z-index: 50;

      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;

      padding: 11px 9px;

      background: #030609;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .preview-button {
      min-height: 39px;

      padding: 8px 13px;

      border: 1px solid #263343;
      border-radius: 10px;

      color: #dfe6ee;
      background: #0b1420;

      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.025em;

      transition:
        background-color 150ms ease,
        border-color 150ms ease,
        color 150ms ease,
        transform 150ms ease;
    }

    .preview-button:active {
      transform: scale(0.98);
    }

    .preview-button.active {
      color: #071018;
      background: var(--active-accent);
      border-color: var(--active-accent);

      box-shadow:
        0 0 0 3px rgba(var(--active-rgb), 0.1),
        0 5px 17px rgba(var(--active-rgb), 0.14);
    }

    /* =====================================================
       APP SHELL
    ====================================================== */

    .app-shell {
      width: min(100%, 430px);
      min-height: calc(100svh - 63px);

      display: flex;
      flex-direction: column;

      position: relative;
      overflow: hidden;

      background: var(--app-bg);
    }

    @media (min-width: 481px) {
      .app-shell {
        min-height: 790px;
        max-height: calc(100svh - 90px);

        margin: 15px 0 22px;

        border: 6px solid #32363b;
        border-radius: 31px;

        box-shadow: 0 22px 65px rgba(0, 0, 0, 0.68);
      }
    }

    /* =====================================================
       HEADER
    ====================================================== */

    .app-header {
      min-height: 76px;

      display: flex;
      align-items: center;
      gap: 11px;

      padding: 13px 15px;

      flex: 0 0 auto;

      background: var(--header-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .header-button {
      width: 41px;
      height: 41px;
      flex: 0 0 41px;

      display: grid;
      place-items: center;

      border: 1px solid #354355;
      border-radius: 12px;

      color: #dbe4ed;
      background: #0a131e;
    }

    .header-button svg {
      width: 21px;
      height: 21px;
    }

    .brand-shield {
      width: 36px;
      height: 42px;
      flex: 0 0 36px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;

      font-size: 15px;
      font-weight: 850;
      letter-spacing: 0.055em;

      white-space: nowrap;
    }

    .brand-subtitle {
      margin-top: 4px;

      color: var(--text-muted);

      font-size: 11px;
      font-weight: 520;
    }

    /* =====================================================
       SCROLL AREA
    ====================================================== */

    .chat-scroll {
      flex: 1 1 auto;
      min-height: 0;

      overflow-y: auto;
      overscroll-behavior-y: contain;
      scroll-behavior: smooth;
      scrollbar-width: none;

      padding: 17px 15px 21px;
    }

    .chat-scroll::-webkit-scrollbar {
      display: none;
    }

    /* =====================================================
       USER MESSAGE
    ====================================================== */

    .user-message {
      width: min(84%, 350px);

      margin-left: auto;
      margin-bottom: 18px;

      padding: 12px 15px;

      border: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 18px 18px 4px 18px;

      background:
        linear-gradient(
          145deg,
          #155269,
          #103b4e
        );

      box-shadow: 0 7px 21px rgba(0, 0, 0, 0.18);
    }

    .message-label {
      display: block;

      margin-bottom: 4px;

      color: #b9d4de;

      font-size: 10px;
      font-weight: 520;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.45;
      font-weight: 590;

      overflow-wrap: anywhere;
    }

    .message-meta {
      display: block;

      margin-top: 7px;

      color: #b4ccd5;
      text-align: right;

      font-size: 10px;
      font-weight: 560;
    }

    /* =====================================================
       RESULT CARD
    ====================================================== */

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(7px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-card {
      position: relative;
      overflow: hidden;

      border: 1px solid rgba(var(--active-rgb), 0.46);
      border-radius: 22px;

      background:
        linear-gradient(
          180deg,
          rgba(var(--active-rgb), 0.085),
          rgba(16, 23, 32, 0.98) 25%,
          rgba(11, 17, 25, 0.99)
        );

      box-shadow:
        0 14px 34px rgba(0, 0, 0, 0.26),
        0 0 24px rgba(var(--active-rgb), 0.075),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);

      animation: card-in 230ms ease-out;
    }

    .card-hero {
      display: grid;
      grid-template-columns: 65px minmax(0, 1fr);
      align-items: center;
      gap: 13px;

      padding: 17px 17px 16px;
    }

    .main-icon {
      width: 61px;
      height: 61px;

      display: grid;
      place-items: center;

      border: 2px solid var(--active-accent);
      border-radius: 50%;

      color: var(--active-accent);
      background: rgba(2, 7, 12, 0.34);

      box-shadow:
        0 0 17px rgba(var(--active-rgb), 0.14),
        inset 0 0 13px rgba(var(--active-rgb), 0.07);
    }

    .main-icon svg {
      width: 31px;
      height: 31px;
      stroke-width: 2.35;
    }

    .hero-copy {
      min-width: 0;
    }

    .status-badge {
      width: max-content;
      max-width: 100%;

      display: inline-flex;
      align-items: center;
      gap: 5px;

      padding: 5px 9px;

      border: 1px solid rgba(var(--active-rgb), 0.54);
      border-radius: 999px;

      color: var(--active-accent);
      background: rgba(var(--active-rgb), 0.045);

      font-size: 10px;
      line-height: 1;
      font-weight: 790;
    }

    .status-badge svg {
      width: 11px;
      height: 11px;
      flex: 0 0 11px;
    }

    .verdict-heading {
      margin: 9px 0 4px;

      color: var(--active-accent);

      font-size: clamp(21px, 6vw, 27px);
      line-height: 1.14;
      font-weight: 850;
      letter-spacing: -0.025em;

      overflow-wrap: anywhere;
    }

    .severity-label {
      color: var(--active-accent);

      font-size: 12px;
      line-height: 1.2;
      font-weight: 820;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card-divider {
      height: 1px;

      margin: 0 15px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--active-rgb), 0.38),
          transparent
        );
    }

    .card-body {
      padding: 9px 16px 13px;
    }

    /* =====================================================
       INFORMATION ROW
    ====================================================== */

    .information-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: start;
      gap: 11px;

      padding: 11px 0;
    }

    .section-icon {
      width: 34px;
      height: 34px;

      display: grid;
      place-items: center;

      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;

      color: var(--text-muted);
      background: #151e28;
    }

    .section-icon svg {
      width: 16px;
      height: 16px;
    }

    .section-content {
      min-width: 0;
    }

    .section-title {
      margin: 0 0 5px;

      color: var(--active-accent);

      font-size: 16px;
      line-height: 1.2;
      font-weight: 780;
    }

    .section-text {
      margin: 0;

      color: var(--text-soft);

      font-size: 14px;
      line-height: 1.52;
      font-weight: 460;

      overflow-wrap: anywhere;
    }

    /* =====================================================
       ACTION PANEL
    ====================================================== */

    .action-panel {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      align-items: start;
      gap: 11px;

      margin: 7px 0 10px;
      padding: 15px;

      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;

      color: var(--action-text);

      background:
        linear-gradient(
          135deg,
          var(--action-start),
          var(--action-end)
        );

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.13),
        0 9px 21px rgba(0, 0, 0, 0.19);
    }

    .action-panel .section-icon {
      width: 40px;
      height: 40px;

      border-color: rgba(0, 0, 0, 0.22);

      color: currentColor;
      background: rgba(255, 255, 255, 0.1);
    }

    .action-panel .section-icon svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.5;
    }

    .action-title {
      margin: 0 0 5px;

      color: currentColor;

      font-size: 16px;
      line-height: 1.25;
      font-weight: 850;
    }

    .action-text {
      margin: 0;

      color: currentColor;

      font-size: 14px;
      line-height: 1.5;
      font-weight: 640;

      overflow-wrap: anywhere;
    }

    /* =====================================================
       CHIPS
    ====================================================== */

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;

      margin-top: 7px;
      padding-top: 14px;

      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .chip {
      min-height: 30px;

      display: inline-flex;
      align-items: center;
      gap: 6px;

      padding: 6px 9px;

      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;

      color: #aeb8c5;
      background: rgba(255, 255, 255, 0.025);

      font-size: 11px;
      line-height: 1.25;
      font-weight: 570;
    }

    .chip svg {
      width: 13px;
      height: 13px;
      flex: 0 0 13px;

      color: var(--active-accent);
    }

    /* =====================================================
       DETAILS
    ====================================================== */

    .details-toggle {
      width: 100%;
      min-height: 54px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;

      padding: 0 15px;

      border: 0;
      border-top: 1px solid rgba(var(--active-rgb), 0.19);

      color: var(--text-main);
      background: rgba(5, 10, 16, 0.56);

      font-size: 13px;
      font-weight: 760;
    }

    .details-toggle-left,
    .details-toggle-right {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .details-toggle-right {
      color: var(--active-accent);
    }

    .details-toggle svg {
      width: 17px;
      height: 17px;
    }

    .details-panel {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;

      padding: 13px 14px 14px;

      border-top: 1px solid rgba(255, 255, 255, 0.06);

      background: #070c12;
    }

    .details-panel.open {
      display: grid;
    }

    .detail-box {
      min-width: 0;

      padding: 9px;

      border: 1px solid #1b2734;
      border-radius: 10px;

      background: #0a121b;
    }

    .detail-key {
      display: block;

      margin-bottom: 4px;

      color: #7f8c9c;

      font-size: 10px;
      font-weight: 560;
    }

    .detail-value {
      display: block;

      color: #d7dee7;

      font-size: 11px;
      line-height: 1.35;
      font-weight: 720;

      overflow-wrap: anywhere;
    }

    /* =====================================================
       FOLLOW-UP PANEL
    ====================================================== */

    .follow-up {
      margin-top: 13px;

      display: grid;
      grid-template-columns: 35px minmax(0, 1fr);
      gap: 11px;
      align-items: center;

      padding: 13px;

      border: 1px solid rgba(56, 189, 248, 0.16);
      border-radius: 15px;

      background: rgba(56, 189, 248, 0.065);
    }

    .follow-up-icon {
      width: 35px;
      height: 35px;

      display: grid;
      place-items: center;

      border: 1px solid rgba(56, 189, 248, 0.26);
      border-radius: 50%;

      color: #48c8f5;
      background: rgba(56, 189, 248, 0.04);
    }

    .follow-up-icon svg {
      width: 17px;
      height: 17px;
    }

    .follow-up-text {
      margin: 0;

      color: #62c8ee;

      font-size: 12px;
      line-height: 1.45;
      font-weight: 620;
    }

    /* =====================================================
       COMPOSER
    ====================================================== */

    .composer {
      min-height: 74px;

      display: grid;
      grid-template-columns: 38px 38px minmax(0, 1fr) 46px;
      align-items: center;
      gap: 8px;

      padding:
        10px
        13px
        max(10px, env(safe-area-inset-bottom));

      flex: 0 0 auto;

      border-top: 1px solid rgba(255, 255, 255, 0.055);

      background: rgba(7, 12, 19, 0.97);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .composer-icon-button {
      width: 38px;
      height: 38px;

      display: grid;
      place-items: center;

      border: 1px solid #263749;
      border-radius: 50%;

      color: #8e9bab;
      background: #0b151f;
    }

    .composer-icon-button svg {
      width: 19px;
      height: 19px;
    }

    .composer-input {
      min-width: 0;
      height: 42px;

      padding: 0 14px;

      border: 1px solid #273747;
      border-radius: 999px;
      outline: 0;

      color: #e7edf4;
      background: #121a24;

      font-size: 12px;
    }

    .composer-input::placeholder {
      color: #667382;
    }

    .composer-input:focus {
      border-color: rgba(56, 189, 248, 0.42);

      box-shadow:
        0 0 0 3px rgba(56, 189, 248, 0.07);
    }

    .send-button {
      width: 46px;
      height: 46px;

      display: grid;
      place-items: center;

      border: 0;
      border-radius: 50%;

      color: #00141c;

      background:
        linear-gradient(
          145deg,
          #39d2f2,
          #11afd7
        );

      box-shadow:
        0 0 19px rgba(38, 200, 236, 0.18);
    }

    .send-button svg {
      width: 22px;
      height: 22px;
    }

    /* =====================================================
       SMALL SCREEN
    ====================================================== */

    @media (max-width: 355px) {
      .preview-button {
        padding: 8px 9px;
        font-size: 10px;
      }

      .chat-scroll {
        padding-left: 11px;
        padding-right: 11px;
      }

      .card-hero {
        grid-template-columns: 57px minmax(0, 1fr);
        gap: 10px;

        padding-left: 13px;
        padding-right: 13px;
      }

      .main-icon {
        width: 55px;
        height: 55px;
      }

      .verdict-heading {
        font-size: 21px;
      }

      .card-body {
        padding-left: 13px;
        padding-right: 13px;
      }

      .section-text,
      .action-text {
        font-size: 13px;
      }

      .composer {
        grid-template-columns: 35px 35px minmax(0, 1fr) 42px;
        gap: 6px;

        padding-left: 9px;
        padding-right: 9px;
      }

      .composer-icon-button {
        width: 35px;
        height: 35px;
      }

      .send-button {
        width: 42px;
        height: 42px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- Preview-only buttons; production में नहीं चाहिए -->
    <nav
      class="preview-controls"
      aria-label="Preview result states"
    >
      <button
        class="preview-button"
        data-state="safe"
        type="button"
      >
        SAFE
      </button>

      <button
        class="preview-button active"
        data-state="attention"
        type="button"
      >
        ATTENTION
      </button>

      <button
        class="preview-button"
        data-state="suspicious"
        type="button"
      >
        SUSPICIOUS
      </button>

      <button
        class="preview-button"
        data-state="red"
        type="button"
      >
        RED
      </button>

      <button
        class="preview-button"
        data-state="unavailable"
        type="button"
      >
        UNAVAILABLE
      </button>
    </nav>

    <section
      class="app-shell"
      aria-label="Veritas Intelligence preview"
    >

      <header class="app-header">

        <button
          class="header-button"
          type="button"
          aria-label="पीछे जाएँ"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <svg
          class="brand-shield"
          viewBox="0 0 60 70"
          aria-hidden="true"
        >
          <defs>
            <linearGradient
              id="brandShieldFill"
              x1="0"
              x2="1"
            >
              <stop
                offset="0"
                stop-color="#a9bbca"
              ></stop>

              <stop
                offset="1"
                stop-color="#d8e4ee"
              ></stop>
            </linearGradient>
          </defs>

          <path
            d="M30 3 L54 12 V32 C54 50 45 61 30 69 C15 61 6 50 6 32 V12 Z"
            fill="rgba(202,221,236,0.08)"
            stroke="#9eb1c1"
            stroke-width="3"
          ></path>

          <path
            d="M30 10 L47 16 V32 C47 44 41 53 30 60 C19 53 13 44 13 32 V16 Z"
            fill="url(#brandShieldFill)"
            opacity="0.9"
          ></path>
        </svg>

        <div class="brand-copy">
          <h1 class="brand-title">
            VERITAS INTELLIGENCE
          </h1>

          <div class="brand-subtitle">
            सत्यापित करें, सुरक्षित रहें
          </div>
        </div>

      </header>

      <section
        class="chat-scroll"
        id="chatScroll"
      >

        <div class="user-message">

          <span class="message-label">
            आपने भेजा
          </span>

          <div
            class="message-text"
            id="messageText"
          ></div>

          <span class="message-meta">
            12:45 PM ✓✓
          </span>

        </div>

        <article
          class="result-card"
          id="resultCard"
          aria-live="polite"
        >

          <section class="card-hero">

            <div
              class="main-icon"
              id="mainIcon"
              aria-hidden="true"
            ></div>

            <div class="hero-copy">

              <div
                class="status-badge"
                id="statusBadge"
              ></div>

              <h2
                class="verdict-heading"
                id="verdictHeading"
              ></h2>

              <div
                class="severity-label"
                id="severityLabel"
              ></div>

            </div>

          </section>

          <div class="card-divider"></div>

          <section class="card-body">

            <div class="information-row">

              <div
                class="section-icon"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle
                    cx="12"
                    cy="12"
                    r="10"
                  ></circle>

                  <path
                    d="M9.1 9a3 3 0 0 1 5.82 1c0 2-2.92 3-2.92 3"
                  ></path>

                  <line
                    x1="12"
                    y1="17"
                    x2="12.01"
                    y2="17"

    function setState(stateName) {
      const state =
        states[stateName];

      if (!state) {
        return;
      }

      root.style.setProperty(
        "--active-accent",
        state.accent
      );

      root.style.setProperty(
        "--active-rgb",
        state.rgb
      );

      root.style.setProperty(
        "--action-start",
        state.actionStart
      );

      root.style.setProperty(
        "--action-end",
        state.actionEnd
      );

      root.style.setProperty(
        "--action-text",
        state.actionText
      );

      document
        .querySelectorAll(".preview-button")
        .forEach((button) => {
          button.classList.toggle(
            "active",
            button.dataset.state === stateName
          );
        });

      document.getElementById(
        "messageText"
      ).textContent = state.message;

      document.getElementById(
        "statusBadge"
      ).innerHTML = state.badge;

      document.getElementById(
        "verdictHeading"
      ).textContent = state.heading;

      document.getElementById(
        "severityLabel"

        "reasonText"
      ).textContent = state.reason;

      document.getElementById(
        "actionLabel"
      ).textContent = state.actionLabel;

      document.getElementById(
        "actionText"
      ).textContent = state.action;

      document.getElementById(
        "actionIcon"
      ).innerHTML = state.actionIcon;

      const benefitRow =
        document.getElementById("benefitRow");

      if (state.benefitLine.trim()) {
        benefitRow.hidden = false;

        document.getElementById(
          "benefitText"
        ).textContent =
          state.benefitLine;
      } else {
        benefitRow.hidden = true;

        document.getElementById(
          "benefitText"
        ).textContent = "";
      }

        "chips"

        .map(

            <span class="chip">
              ${chip.icon}
              <span>${chip.text}</span>
            </span>

        )
        .join("");

        "contextCode"
      ).textContent =
        state.contextCode;

      document.getElementById(
        "actionCode"
      ).textContent =
        state.actionCode;

      document.getElementById(
        "linkStatus"
      ).textContent =
        state.linkStatus;

      document.getElementById(
        "confidence"
      ).textContent =
        state.confidence;

      closeDetails();

      resultCard.style.animation =
        "none";

      void resultCard.offsetHeight;

      resultCard.style.animation =
        "";

      chatScroll.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

      const panel =
        document.getElementById(
          "detailsPanel"
        );

      const toggle =
        document.getElementById(
          "detailsToggle"
        );

      panel.classList.remove("open");

      toggle.setAttribute(

        "false"
      );

      document.getElementById(

        "और जानकारी";

        '<polyline points="6 9 12 15 18 9"></polyline>';

      .getElementById(
        "detailsToggle"

            document.getElementById(
              "detailsToggle"
            );

          const willOpen =
            !panel.classList.contains(
              "open"

            "open",
            willOpen

            "aria-expanded",
            String(willOpen)
