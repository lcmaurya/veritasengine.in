<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veritas Guard</title>
<style>
body {background:#0f172a;color:white;text-align:center;font-family:Arial;}
.card {background:#1e293b;padding:20px;margin:20px;border-radius:12px;}
input {width:90%;padding:12px;border-radius:8px;border:none;}
button {padding:12px;margin:5px;border:none;border-radius:8px;}
.generate{background:#2563eb;color:white;}
</style>
</head>

<body>

<h2>Veritas Guard</h2>

<div class="card">

<input id="msg" placeholder="Enter message">

<button class="generate" onclick="generate()">Generate Proof Link</button>

<div id="result"></div>

</div>

<script>

async function generate(){

  const message = document.getElementById("msg").value;

  const res = await fetch("https://veritas-trust-engine.onrender.com/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":"mysecret123"
    },
    body:JSON.stringify({
      name:"user",
      dob:"2000",
      message:message
    })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    "🔗 <a href='"+data.link+"' target='_blank'>Open Proof</a>";
}
</script>

</body>
</html>
