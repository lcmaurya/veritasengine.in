<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas Trust Engine | Secure Dashboard</title>
    <!-- Tailwind CSS for Premium Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Custom Scrollbar for the table */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900/50 sticky top-0 z-10 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-wide text-white">Veritas<span class="text-blue-500">Guard</span></h1>
                    <p class="text-xs text-slate-400 -mt-1">Cryptographic Trust Engine</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-sm">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-emerald-400 font-medium">System Live</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- Left Column: Actions & Stats (Takes 4 cols out of 12) -->
        <div class="lg:col-span-4 space-y-6">
            
            <!-- Stats Grid -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-slate-400 text-sm font-medium mb-1">Total Proofs</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="stat-total" class="text-3xl font-bold text-white">--</h2>
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-slate-400 text-sm font-medium mb-1">Latest Block</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="stat-block" class="text-3xl font-bold text-blue-400">--</h2>
                        <span class="text-xs text-slate-500 font-mono">Height</span>
                    </div>
                </div>
            </div>

            <!-- Generate Proof Card -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
                <!-- Decorative gradient blob -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/20 rounded-full blur-3xl"></div>
                
                <h3 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Create Secure Record
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Transaction Data / Message</label>
                        <textarea id="msg" rows="3" placeholder="Enter transfer details or secure message..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all resize-none"></textarea>
                    </div>
                    
                    <button id="generateBtn" onclick="generate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 flex justify-center items-center gap-2">
                        <span>Sign & Generate Proof</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>

                    <!-- Success Alert (Hidden by default) -->
                    <div id="success-alert" class="hidden mt-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-4">
                        <div class="flex items-start gap-3">
                            <svg class="w-5 h-5 text-emerald-400 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <div>
                                <h4 class="text-sm font-medium text-emerald-400">Record Secured!</h4>
                                <div id="link" class="mt-1 text-xs"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Ledger History (Takes 8 cols out of 12) -->
        <div class="lg:col-span-8">
            <div class="glass-card rounded-2xl h-full flex flex-col">
                <div class="p-6 border-b border-slate-700/50 flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                        Immutable Ledger History
                    </h3>
                    <button onclick="load()" class="text-slate-400 hover:text-white transition-colors p-2 bg-slate-800 rounded-lg hover:bg-slate-700" title="Refresh Ledger">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
                
                <div class="overflow-x-auto p-4 flex-grow">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs uppercase tracking-wider text-slate-500 border-b border-slate-700/50">
                                <th class="pb-3 px-4 font-semibold">Block</th>
                                <th class="pb-3 px-4 font-semibold">Message / Data</th>
                                <th class="pb-3 px-4 font-semibold">Timestamp</th>
                                <th class="pb-3 px-4 font-semibold text-right">Verification</th>
                            </tr>
                        </thead>
                        <tbody id="history" class="text-sm divide-y divide-slate-800/50">
                            <!-- History Rows will be injected here via JS -->
                            <tr>
                                <td colspan="4" class="text-center py-8 text-slate-500">Loading secure ledger...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = "https://veritas-trust-engine.onrender.com";
        const API_KEY = "mysecret123";

        // Helper to format date nicely
        function formatTime(timestamp) {
            if(!timestamp) return "Just now";
            const date = new Date(timestamp);
            return date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function generate(){
            const msgInput = document.getElementById("msg");
            const btn = document.getElementById("generateBtn");
            const msg = msgInput.value.trim();

            if(!msg) {
                alert("Please enter a message or transaction data.");
                return;
            }

            // UI Loading State
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_KEY
                    },
                    body: JSON.stringify({
                        name: "SecureClient",
                        dob: "2024",
                        message: msg
                    })
                });

                const data = await res.json();

                if(res.ok) {
                    // Show success alert
                    document.getElementById("success-alert").classList.remove("hidden");
                    document.getElementById("link").innerHTML = 
                        `<a href='${data.link}' target='_blank' class='text-blue-400 hover:text-blue-300 underline underline-offset-2 flex items-center gap-1 mt-1'>
                            View Cryptographic Proof <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>`;
                    
                    msgInput.value = ""; // Clear input
                    load(); // Refresh dashboard
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                alert("Connection error. Is the server running?");
            } finally {
                // Restore button
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }

        async function load(){
            try {
                // Fetch Stats
                const s = await fetch(`${API_BASE}/stats`);
                const stats = await s.json();

                // Animate numbers (simple effect)
                document.getElementById("stat-total").innerText = stats.total || 0;
                document.getElementById("stat-block").innerText = "#" + (stats.latestBlock || 0);

                // Fetch History
                const h = await fetch(`${API_BASE}/history`);
                const hist = await h.json();

                let html = "";
                if(hist.length === 0) {
                    html = `<tr><td colspan="4" class="text-center py-8 text-slate-500">No records found. Generate one above.</td></tr>`;
                } else {
                    hist.forEach(p => {
                        // Creating a beautiful table row for each record
                        html += `
                        <tr class="hover:bg-slate-800/30 transition-colors group">
                            <td class="py-4 px-4">
                                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2.5 py-1 rounded-md text-xs font-mono font-medium">
                                    BLK-${p.block}
                                </span>
                            </td>
                            <td class="py-4 px-4">
                                <p class="text-white font-medium truncate max-w-[200px] lg:max-w-[300px]" title="${p.message}">${p.message}</p>
                                <p class="text-xs text-slate-500 font-mono mt-1 truncate max-w-[200px]" title="${p.hash}">Hash: ${p.hash ? p.hash.substring(0,16)+'...' : 'N/A'}</p>
                            </td>
                            <td class="py-4 px-4 text-slate-400 text-xs">
                                ${formatTime(p.time)}
                            </td>
                            <td class="py-4 px-4 text-right">
                                <a href="${p.link}" target="_blank" class="inline-flex items-center gap-1 text-xs font-medium text-emerald-400 hover:text-emerald-300 bg-emerald-500/10 hover:bg-emerald-500/20 px-3 py-1.5 rounded-lg border border-emerald-500/20 transition-colors">
                                    Verify
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </a>
                            </td>
                        </tr>`;
                    });
                }
                document.getElementById("history").innerHTML = html;
            } catch(e) {
                console.error("Error loading data:", e);
                document.getElementById("history").innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-400">Failed to load system data.</td></tr>`;
            }
        }

        // Load data when page loads
        load();
    </script>
</body>
</html>
