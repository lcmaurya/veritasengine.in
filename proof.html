<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Dark background from screenshot */
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 60px 20px; 
        }
        h1 { 
            font-size: 26px; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 600; 
        }
        .container { 
            background-color: #1e293b; 
            padding: 30px 20px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
        }
        
        /* Status Text (Loading / Error) */
        .status-box { 
            font-size: 20px; 
            color: #e2e8f0; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        .error-icon { color: #ef4444; font-size: 24px; }
        
        /* Data Display UI */
        .data-row { 
            text-align: left; 
            margin-bottom: 15px; 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
        }
        .data-row label { 
            display: block; 
            font-size: 12px; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-weight: 600; 
            letter-spacing: 0.5px; 
        }
        .data-row span { 
            font-family: monospace; 
            font-size: 14px; 
            word-break: break-all; 
            color: #f8fafc; 
            line-height: 1.5; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>🔐 Proof Verification</h1>
    
    <div class="container" id="mainContainer">
        <!-- Status / Error Box -->
        <div id="statusBox" class="status-box">
            Loading...
        </div>
        
        <!-- Verification Data -->
        <div id="proofData" class="hidden">
            <div class="data-row"><label>Hash</label><span id="pHash"></span></div>
            <div class="data-row"><label>Signature</label><span id="pSig"></span></div>
            <div class="data-row"><label>Block</label><span id="pBlock"></span></div>
            <div class="data-row"><label>Timestamp</label><span id="pTime"></span></div>
        </div>
    </div>

    <script>
        async function fetchProof() {
            const statusBox = document.getElementById('statusBox');
            const proofData = document.getElementById('proofData');
            
            // 1. Get ID from the URL exactly as passed by index.html
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // If no ID is in URL, show error directly
            if (!id) {
                showError();
                return;
            }

            try {
                // 2. Call API (Fix: Added x-api-key header to GET request)
                const response = await fetch(`https://veritas-system.onrender.com/proof?id=${id}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'mysecret123' // YEH MISSING THA!
                    }
                });
                
                if (!response.ok) {
                    throw new Error("Proof not found on server");
                }

                const data = await response.json();

                // 3. Hide loading, map data to UI
                statusBox.classList.add('hidden');
                
                document.getElementById('pHash').textContent = data.hash;
                document.getElementById('pSig').textContent = data.signature;
                document.getElementById('pBlock').textContent = data.block;
                
                // Format Timestamp cleanly
                const dateObj = new Date(Number(data.time));
                document.getElementById('pTime').textContent = dateObj.toLocaleString();

                // Show Data
                proofData.classList.remove('hidden');

            } catch (error) {
                console.error("[DEBUG] Error fetching proof:", error);
                showError();
            }
        }

        // Error rendering matching your 2nd screenshot
        function showError() {
            const statusBox = document.getElementById('statusBox');
            statusBox.innerHTML = '<span class="error-icon">❌</span> Invalid Proof';
            statusBox.classList.remove('hidden');
            document.getElementById('proofData').classList.add('hidden');
        }

        // Start function when page loads
        fetchProof();
    </script>
</body>
</html>
