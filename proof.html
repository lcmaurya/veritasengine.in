<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof</title>
<style>
body{background:#0f172a;color:white;text-align:center;font-family:Arial;}
.card{background:#1e293b;padding:20px;margin:20px;border-radius:12px;}
</style>
</head>

<body>

<h2>Proof Verification</h2>

<div class="card" id="data">Loading...</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

fetch("https://veritas-trust-engine.onrender.com/proof?id="+id)
.then(res=>res.json())
.then(data=>{
  document.getElementById("data").innerHTML =
    "Message:<br>"+data.message+
    "<br><br>Hash:<br>"+data.hash+
    "<br><br>Signature:<br>"+data.signature+
    "<br><br>Block:#"+data.block;
});
</script>

</body>
</html>
