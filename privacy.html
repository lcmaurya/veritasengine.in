<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .container {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .data-row {
            text-align: left;
            margin-bottom: 15px;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
        }
        .data-row label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .data-row span {
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            color: #e2e8f0;
        }
        .hidden { display: none !important; }
        .error { color: #ef4444; font-weight: 600; font-size: 18px; }
    </style>
</head>
<body>

    <h1>🔐 Proof Verification</h1>
    
    <div class="container" id="mainContainer">
        <p id="statusMsg">Loading...</p>
        
        <div id="proofData" class="hidden">
            <div class="data-row"><label>Hash</label><span id="pHash"></span></div>
            <div class="data-row"><label>Signature</label><span id="pSig"></span></div>
            <div class="data-row"><label>Block</label><span id="pBlock"></span></div>
            <div class="data-row"><label>Timestamp</label><span id="pTime"></span></div>
        </div>
    </div>

    <script>
        async function fetchProof() {
            const statusMsg = document.getElementById('statusMsg');
            const proofData = document.getElementById('proofData');
            
            // 1. Read ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                statusMsg.textContent = "Proof not found (No ID provided)";
                statusMsg.className = "error";
                return;
            }

            try {
                // 2. Call API
                const response = await fetch(`https://veritas-system.onrender.com/proof?id=${id}`);
                
                if (!response.ok) {
                    throw new Error("Not found");
                }

                const data = await response.json();

                // 3. Show Success Data
                statusMsg.classList.add('hidden');
                
                document.getElementById('pHash').textContent = data.hash;
                document.getElementById('pSig').textContent = data.signature;
                document.getElementById('pBlock').textContent = data.block;
                
                // Date formatting for proof page as well
                document.getElementById('pTime').textContent = new Date(Number(data.time)).toLocaleString();

                proofData.classList.remove('hidden');

            } catch (error) {
                console.error("[DEBUG] Proof Fetch Error:", error);
                // 4. Show Fail Message & Remove Loading
                statusMsg.textContent = "Proof not found";
                statusMsg.className = "error";
            }
        }

        // Execute on load
        fetchProof();
    </script>
</body>
</html>
